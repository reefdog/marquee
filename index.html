<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="description" content="Find out what's playing near you. Enter your ZIP, pick a date, and get clean movie showtimes — no dark patterns, no upsells, no autoplay trailers. US-only.">
	<meta name="apple-mobile-web-app-title" content="Marquee">
	<title>marquee: movie showtimes</title>
	<style>
		:root {
			--body--padding: 1rem;
			--body--gap: 7rem;
		}

		*,*::before,*::after {
			box-sizing: border-box;
		}

		html {
			font-size: 10px;
		}

		body {
			font-family: Inconsolata, 'Courier Prime', monospace;
			font-size: 1.6rem;
			line-height: 150%;
			color: black;
			background: white;
			padding: var(--body--padding);
			transition: padding 200ms ease-in-out;

			display: flex;
			flex-direction: column;
			gap: var(--body--gap);

			@media (min-width: 900px) {
				--body--padding: 4rem;
			}
		}

		header > h1 {
			font-size: 1em;
			margin: 0 0 1em 0;
			font-weight: normal;
		}

		main {
			display: flex;
			flex-direction: column;
			gap: 7rem;
			transition: opacity 100ms ease-in-out;

			.loading & {
				opacity: 0.15;
			}
		}

		a {
			text-decoration: none;
			color: inherit;

			&:hover {
				text-decoration: underline;
			}
			& .threed-blue { color: blue; }
			& .threed-red  { color: red; }
		}

		button, select, input {
			font-family: inherit;
		}

		#get-showtimes-form {
			display: flex;
			flex-wrap: wrap;
			min-height: 5rem;
			line-height: 100%;
			gap: 1rem 2rem;
		}

		#geo-options {
			gap: 0.5rem;

			& [name="zip"] {
				width: 10ch;
				max-width: calc(100vw - var(--body--padding) * 2);
				text-align: center;
			}
		}

		input-group {
			display: flex;
			flex-wrap: wrap;
		}

		.primary-section {
			display: flex;
			flex-direction: column;
			gap: 1rem;
		}

		.secondary-sections {
			display: flex;
			flex-direction: column;
			gap: 2rem;

			@media (min-width: 900px) {
				display: grid;
				grid-template-columns: 1fr 1fr;
				column-gap: var(--body--gap);
			}
		}

		.secondary-sections-col {
			display: flex;
			flex-direction: column;
			gap: 2rem;
		}

		.secondary-section {
			display: flex;
			flex-direction: column;
			gap: 0.5rem;
		}

		.primary-label {
			font-size: 150%;
			font-weight: 700;
			margin: 0;
		}

		.secondary-label {
			font-size: 100%;
			font-weight: 600;
			margin: 0;
		}

		.primary-metadata {
			display: flex;
			flex-wrap: wrap;
			column-gap: 2rem;
			margin: 0;
			padding: 0;
			list-style-type: none;
			font-size: 80%;
			color: #aaa;

			& li {
				padding: 0;
			}
			& a {
				color: #333;
				text-decoration: underline;

				&:hover {
					text-decoration: none;
				}
			}
		}

		.showtime-block {
			display: flex;
			flex-wrap: wrap;
			column-gap: 2rem;
			margin: 0;
			padding: 0;
			list-style-type: none;

			& > li {
				padding: 0;
			}

			@media (min-width: 900px) {
				column-gap: 3rem;
			}
		}

		.threed,
		.imax {
			font-size: 75%;
			font-weight: bold;
		}

		.past {
			color: #aaa;
		}

		.block-radio-button {
			cursor: pointer;
			user-select: none;

			&:has(> input[type=radio]:disabled) {
				cursor: not-allowed;
				opacity: 0.35;
			}

			& > input[type=radio] {
				position: absolute;
				opacity: 0;
				pointer-events: none;

				&:focus-visible + radio-label {
					outline: 0.2rem solid #2F80ED;
					outline-offset: 0.2rem;
				}
				&:checked + radio-label {
					z-index: 1;
					box-shadow: inset 0 0 0 0.4rem #2F80ED;
					color: #000;
					font-weight: bold;
				}
			}
			& > radio-label {
				display: flex;
				align-items: center;
				justify-content: center;
				height: 100%;
				box-shadow: inset 0 0 0 0.1rem #BDBDBD;
				text-align: center;
				white-space: nowrap;
				padding: 0.5rem 1.1rem;
				color: #333;
			}
			&:not(:has(> input[type=radio]:is(:disabled, :checked))) > radio-label:hover {
				box-shadow: inset 0 0 0 0.4rem #BDBDBD;
			}
		}

	</style>
</head>
<body>

<header>
	<h1><a href="/">&lt;marquee&gt;</a></h1>
	<form id="get-showtimes-form" action="https://data.tmsapi.com/v1.1/movies/showings" method="GET">
		<input name="password" type="hidden" value="casablanca">
		<input-group id="geo-options">
			<input name="zip" type="text" inputmode="numeric" pattern="[0-9]{5}" placeholder="ZIP code" aria-label="ZIP code" autofocus>
			<select name="radius" aria-label="Search radius">
				<option value="5">5 miles</option>
				<option value="10">10 miles</option>
				<option value="50">50 miles</option>
				<option value="100">100 miles</option>
			</select>
			<button type="submit">Find</button>
		</input-group>
		<input-group id="date-options" role="radiogroup" aria-label="Date"></input-group>
		<input-group role="radiogroup" aria-label="Group by">
			<label class="block-radio-button"><input value="Movie"   name="groupBy" type="radio" checked> <radio-label>Movie</radio-label></label>
			<label class="block-radio-button"><input value="Theater" name="groupBy" type="radio">         <radio-label>Theater</radio-label></label>
		</input-group>
		<input-group role="radiogroup" aria-label="Filter to only">
			<label class="block-radio-button"><input value="All"  name="filterBy" type="radio" checked> <radio-label>All</radio-label></label>
			<label class="block-radio-button"><input value="IMAX" name="filterBy" type="radio">         <radio-label>IMAX</radio-label></label>
			<label class="block-radio-button"><input value="3D"   name="filterBy" type="radio">         <radio-label>3D</radio-label></label>
		</input-group>
	</form>
</header>

<main id="showtimes"></main>

<script>
(function(){
	const Marquee = window.Marquee = window.Marquee || {

		apiUrl: 'https://data.tmsapi.com/v1.1/movies/showings',
		apiShowtimeCache: {},
		apiShowtimeData:  [],
		apiKeyEncrypted: "{\"salt\":\"0Vs0u/2OElGlRPpkGK8ghg==\",\"iv\":\"YzgrD4KQ6/653fBc\",\"ct\":\"IzFp0LOO7cfsxRJKBNRhvbEblXutrafAo1lgcaR8UhYEnlgWN2KXOw==\"}",
		sortOrders: {
			byMovie: {
				byTitle: [],
				byReleaseDate: [],
			},
			byTheater: {
				byName: [],
			},
		},

		els: {
			$body:             document.body,
			$showtimes:        document.getElementById('showtimes'),
			$groupButtons:     document.querySelectorAll('[name="groupBy"]'),
			$filterButtons:    document.querySelectorAll('[name="filterBy"]'),
			$getShowtimesForm: document.getElementById('get-showtimes-form'),
			$dateOptions:      document.getElementById('date-options'),
		},

		init: function() {
			Marquee.loadCookies();
			Marquee.setupDates();
			Marquee.updateGroupings();
			Marquee.filterBy = document.querySelector('[name="filterBy"]:checked').value;

			Marquee.els.$getShowtimesForm.addEventListener('submit', Marquee.submitShowtimesForm);
			Marquee.els.$dateButtons.forEach(button => {
				button.addEventListener('change', Marquee.changeDate);
			});
			Marquee.els.$groupButtons.forEach(button => {
				button.addEventListener('change', Marquee.changeGrouping);
			});
			Marquee.els.$filterButtons.forEach(button => {
				button.addEventListener('change', Marquee.changeFilter);
			});

			if (localStorage.getItem('zip')) {
				Marquee.autoSearch();
			}
		},

		autoSearch: function() {
			const radiusSelect = document.querySelector('[name="radius"]');
			const attempt = () => {
				Marquee.clearData();
				Marquee.fetchMovieTimes(() => {
					if (radiusSelect.selectedIndex < radiusSelect.options.length - 1) {
						radiusSelect.selectedIndex++;
						attempt();
					}
				});
			};
			attempt();
		},

		loadCookies: function() {
			const zip = localStorage.getItem('zip');
			if (zip) {
				document.querySelector('[name="zip"]').value = zip;
			}
		},

		saveCookies: function() {
			localStorage.setItem('zip', document.querySelector('[name="zip"]').value);
		},

		setupDates: function() {
			let dates = [];
			for (let i = 0; i < 7; i++) {
				const date = dayjs().add(i, 'day');
				dates.push(`
					<label class="block-radio-button">
						<input
							value="${date.format('YYYY-MM-DD')}"
							name="startDate"
							type="radio"
							${i === 0 ? ' checked' : ''}
						>
						<radio-label>
							${date.format('ddd')}<br>${date.format('MMM D')}
						</radio-label>
					</label>
				`);
			}
			dates = dates.join('');
			Marquee.els.$dateOptions.innerHTML = dates;
			Marquee.els.$dateButtons = document.querySelectorAll('[name="startDate"]');
		},

		changeDate: function() {
			if (Marquee.submittable()) {
				Marquee.autoSearch();
			}
		},

		submittable: function() {
			return (document.querySelector('[name="zip"]').value !== '');
		},

		changeGrouping: function() {
			Marquee.updateGroupings();
			if (this.checked) {
				Marquee.renderShowtimes();
			}
		},

		changeFilter: function() {
			if (this.checked) {
				Marquee.filterBy = this.value;
				Marquee.renderShowtimes();
			}
		},

		updateGroupings: function() {
			Marquee.primaryGroup = document.querySelector('[name="groupBy"]:checked').value;
			Marquee.secondaryGroup = Marquee.primaryGroup === 'Movie' ? 'Theater' : 'Movie';
		},

		submitShowtimesForm: function(event) {
			event.preventDefault();
			if (Marquee.submittable()) {
				Marquee.autoSearch();
			}
		},

		decryptApiKey: async function() {
			const password = document.querySelector('[name="password"]').value;
			const { salt, iv, ct } = JSON.parse(Marquee.apiKeyEncrypted);
			const enc = new TextEncoder();
			const keyMaterial = await crypto.subtle.importKey(
				'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
			);
			const key = await crypto.subtle.deriveKey(
				{
					name: 'PBKDF2',
					salt: Uint8Array.from(atob(salt), c => c.charCodeAt(0)),
					iterations: 100000,
					hash: 'SHA-256',
				},
				keyMaterial,
				{ name: 'AES-GCM', length: 256 },
				false,
				['decrypt']
			);
			const decrypted = await crypto.subtle.decrypt(
				{ name: 'AES-GCM', iv: Uint8Array.from(atob(iv), c => c.charCodeAt(0)) },
				key,
				Uint8Array.from(atob(ct), c => c.charCodeAt(0))
			);
			return new TextDecoder().decode(decrypted);
		},

		serializeForm: function() {
			return {
				zip:       document.querySelector('[name="zip"]').value,
				radius:    document.querySelector('[name="radius"]').value,
				startDate: document.querySelector('[name="startDate"]:checked').value,
			};
		},

		clearData: function() {
			Marquee.apiShowtimeData    = [];
			Marquee.dataForMovie       = {};
			Marquee.dataForTheater     = {};
			Marquee.showtimesByMovie   = {};
			Marquee.showtimesByTheater = {};
			Marquee.showtimeBlocks     = {};
		},

		fetchMovieTimes: async function(onNoResults) {
			if (Marquee.cached()) {
				Marquee.renderFromCache();
				return;
			}
			Marquee.els.$body.classList.add('loading');
			try {
				const apiKey = await Marquee.decryptApiKey();
				const params = new URLSearchParams({ ...Marquee.serializeForm(), api_key: apiKey });
				const response = await fetch(`${Marquee.apiUrl}?${params}`);
				if (!response.ok) throw new Error('Server error');
				const text = await response.text();
				const data = text.trim() ? JSON.parse(text) : [];
				if (!data.length) {
					if (onNoResults) {
						onNoResults();
					} else {
						alert('There are no results for this ZIP code.');
					}
					return;
				}
				Marquee.saveCookies();
				Marquee.apiShowtimeCache[Marquee.makeCacheKey()] = data;
				Marquee.renderFromCache();
			} catch (err) {
				alert(err.message || 'Connection error');
			} finally {
				Marquee.els.$body.classList.remove('loading');
			}
		},

		makeCacheKey: function() {
			const data = Marquee.serializeForm();
			return `${data.zip}--${data.radius}--${data.startDate}`;
		},

		cached: function() {
			return Object.hasOwn(Marquee.apiShowtimeCache, Marquee.makeCacheKey());
		},

		renderFromCache: function() {
			Marquee.apiShowtimeData = Marquee.apiShowtimeCache[Marquee.makeCacheKey()];
			Marquee.processShowtimes();
			Marquee.updateFilterAvailability();
			Marquee.renderShowtimes();
		},

		updateFilterAvailability: function() {
			const showtimes = Object.values(Marquee.showtimeBlocks).flatMap(b => Object.values(b.showtimes));
			const hasImax = showtimes.some(s => s.imax);
			const has3D   = showtimes.some(s => s.threed);

			document.querySelector('[name="filterBy"][value="IMAX"]').disabled = !hasImax;
			document.querySelector('[name="filterBy"][value="3D"]').disabled   = !has3D;

			if ((Marquee.filterBy === 'IMAX' && !hasImax) || (Marquee.filterBy === '3D' && !has3D)) {
				document.querySelector('[name="filterBy"][value="All"]').checked = true;
				Marquee.filterBy = 'All';
			}
		},

		filteredBlockHtml: function(block) {
			if (Marquee.filterBy === 'All') return block.html;
			const flag = Marquee.filterBy === 'IMAX' ? 'imax' : 'threed';
			let html = '';
			block.showtimesKeys.forEach(key => {
				const s = block.showtimes[key];
				if (s[flag]) {
					html += `
						<li data-threed="${s.threed}" data-imax="${s.imax}">
							${Marquee.createShowtimeLink(s)}
						</li>
					`;
				}
			});
			return html;
		},

		renderShowtimes: function() {
			let html = '';
			const showtimes = Marquee[`showtimesBy${Marquee.primaryGroup}`];
			Object.entries(showtimes).forEach(([primaryId, secondaryObject]) => {
				const sections = [];
				Object.entries(secondaryObject).forEach(([secondaryId, block]) => {
					const blockHtml = Marquee.filteredBlockHtml(block);
					if (!blockHtml) return;
					const secondaryEntity = Marquee[`dataFor${Marquee.secondaryGroup}`][secondaryId];
					sections.push(`
						<section class="secondary-section">
							<h2 class="secondary-label">${secondaryEntity.label}</h2>
							<ul class="showtime-block">${blockHtml}</ul>
						</section>
					`);
				});
				if (!sections.length) return;
				const tipper = Math.ceil(sections.length / 2);
				const leftCol  = sections.slice(0, tipper).join('');
				const rightCol = sections.slice(tipper).join('');
				const primaryEntity = Marquee[`dataFor${Marquee.primaryGroup}`][primaryId];
				html += `
					<section class="primary-section">
						<h1 class="primary-label">${primaryEntity.label}</h1>
						${primaryEntity.metadata.length ? `<ul class="primary-metadata"><li>${primaryEntity.metadata.join('</li><li>')}</li></ul>` : ''}
						<div class="secondary-sections">
							<div class="secondary-sections-col">${leftCol}</div>
							<div class="secondary-sections-col">${rightCol}</div>
						</div>
					</section>
				`;
			});
			Marquee.els.$showtimes.innerHTML = html;
		},

		processShowtimes: function() {
			Marquee.apiShowtimeData.sort((a, b) => {
				const aRelease = a.releaseDate || '1900-01-01';
				const bRelease = b.releaseDate || '1900-01-01';
				if (aRelease === bRelease) {
					return a.title > b.title;
				}
				return dayjs(aRelease).valueOf() > dayjs(bRelease).valueOf();
			});
			Marquee.apiShowtimeData.forEach(movie => {
				Marquee.sortOrders.byMovie.byReleaseDate.push(movie.rootId);
				Marquee.createMovie(movie);
				movie.showtimes.forEach(showtime => {
					Marquee.createTheater(showtime.theatre);
					Marquee.seedGroupings(movie.rootId, showtime.theatre.id);
					Marquee.addToShowtimeBlock(movie, showtime);
				});
			});
			Marquee.createShowtimeHTML();
			Marquee.groupShowtimes();
		},

		createMovie: function(movie) {
			Marquee.dataForMovie[movie.rootId] = Marquee.dataForMovie[movie.rootId] || {
				label:       movie.title || '[no title]',
				year:        movie.releaseYear || null,
				releaseDate: movie.releaseDate || null,
				rating:      movie.ratings ? movie.ratings[0].code : null,
				site:        movie.officialUrl || null,
				language:    movie.titleLang || null,
				runtime:     movie.runTime ? movie.runTime.replace('PT0', '').replace('PT', '') : null,
			};
			Marquee.createMovieMetadata(movie.rootId);
		},

		createMovieMetadata: function(id) {
			const movie    = Marquee.dataForMovie[id];
			const metadata = [];
			const year = movie.year || movie.releaseDate?.substring(0, 4) || null;
			if (year) { metadata.push(year); }
			if (movie.runtime) { metadata.push(movie.runtime.toLowerCase()); }
			if (movie.rating) { metadata.push(`Rated ${movie.rating}`); }
			if (movie.site) { metadata.push(`<a href="${movie.site}">Site</a>`); }
			Marquee.dataForMovie[id].metadata = metadata;
		},

		createTheater: function(theater) {
			Marquee.dataForTheater[theater.id] = Marquee.dataForTheater[theater.id] || {
				label: theater.name,
			};
			Marquee.createTheaterMetadata(theater.id);
		},

		createTheaterMetadata: function(id) {
			const metadata = [];
			Marquee.dataForTheater[id].metadata = metadata;
		},

		addToShowtimeBlock: function(movie, showtime) {
			const uid = movie.rootId + '-' + showtime.theatre.id;
			Marquee.showtimeBlocks[uid] = Marquee.showtimeBlocks[uid] || {showtimes: {}, showtimesKeys: []};

			const showtimeData = {
				movieId:       movie.rootId,
				theaterId:     showtime.theatre.id,
				dateTime:      showtime.dateTime,
				dateTimeDayJS: dayjs(showtime.dateTime),
				ticket:        showtime.ticketURI,
				threed:        Marquee.is3D(movie),
				imax:          Marquee.isIMAX(movie),
			};
			Marquee.showtimeBlocks[uid].showtimes[showtimeData.dateTimeDayJS.unix()] = showtimeData;
			Marquee.showtimeBlocks[uid].showtimesKeys.push(showtimeData.dateTimeDayJS.unix());
		},

		seedGroupings: function(movieId, theaterId) {
			Marquee.showtimesByMovie[movieId] = Marquee.showtimesByMovie[movieId] || {};
			Marquee.showtimesByMovie[movieId][theaterId] = Marquee.showtimesByMovie[movieId][theaterId] || {};
			Marquee.showtimesByTheater[theaterId] = Marquee.showtimesByTheater[theaterId] || {};
			Marquee.showtimesByTheater[theaterId][movieId] = Marquee.showtimesByTheater[theaterId][movieId] || {};
		},

		createShowtimeHTML: function() {
			Object.entries(Marquee.showtimeBlocks).forEach(([uid, block]) => {
				let html = '';
				block.showtimesKeys.sort();
				block.showtimesKeys.forEach(key => {
					const showtimeData = block.showtimes[key];
					html += `
						<li data-threed="${showtimeData.threed}" data-imax="${showtimeData.imax}">
							${Marquee.createShowtimeLink(showtimeData)}
						</li>
					`;
				});
				block.html = html;
			});
		},

		groupShowtimes: function() {
			Object.entries(Marquee.showtimeBlocks).forEach(([uid, block]) => {
				const ids       = uid.split('-');
				const movieId   = ids[0];
				const theaterId = ids[1];
				Marquee.showtimesByMovie[movieId][theaterId]   = block;
				Marquee.showtimesByTheater[theaterId][movieId] = block;
			});
		},

		is3D: function(movie) {
			return movie.title.includes('3D');
		},

		isIMAX: function(movie) {
			return movie.title.includes('IMAX');
		},

		createThreeD: function(showtime) {
			return (showtime.threed ? '<span class="threed"> <span class="threed-blue">3</span><span class="threed-red">D</span></span>' : '');
		},

		createIMAX: function(showtime) {
			return (showtime.imax ? '<span class="imax"> IMAX</span>' : '');
		},

		createShowtimeLink: function(showtime) {
			if (showtime.dateTimeDayJS.isBefore(dayjs())) {
				return `
					<span class="past">
						${showtime.dateTimeDayJS.format('h:mma')}${Marquee.createThreeD(showtime)}${Marquee.createIMAX(showtime)}
					</span>`;
			} else {
				return `
					<a href="${showtime.ticket}">
						${showtime.dateTimeDayJS.format('h:mma')}${Marquee.createThreeD(showtime)}${Marquee.createIMAX(showtime)}
					</a>`;
			}
		},

	};
	Marquee.init();
})();
</script>
</body>
</html>
