<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="description" content="Find out what's playing near you. Enter your ZIP, pick a date, and get clean movie showtimes — no dark patterns, no upsells, no autoplay trailers. US-only.">
	<meta name="apple-mobile-web-app-title" content="Marquee">
	<title>marquee: movie showtimes</title>
	<style>
		:root {
			--body--padding: 1rem;
			--body--gap: 7rem;

			--animation-timing: 0.25s;
			--animation-timing--fast: 0.1s;

			@media (min-width: 900px) {
				--body--padding: 4rem;
			}
		}


		*, *::before, *::after {
			box-sizing: border-box;
		}

		html {
			font-size: 10px;
		}

		body {
			font-family: Inconsolata, 'Courier Prime', monospace, 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji';
			font-size: 1.6rem;
			line-height: 150%;
			color: black;
			background: white;
			margin: 0;
			padding: var(--body--padding);
			transition: padding 200ms ease-in-out;

			display: flex;
			flex-direction: column;
			gap: var(--body--gap);
		}

		header > h1 {
			font-size: 1em;
			margin: 0 0 1em 0;
			font-weight: normal;
		}

		main {
			display: flex;
			flex-direction: column;
			gap: 7rem;
			transition: opacity 100ms ease-in-out;

			.loading & {
				opacity: 0.15;
			}
		}

		a {
			text-decoration: none;
			color: inherit;

			&:hover {
				text-decoration: underline;
			}

			& .threed-blue { color: blue; }
			& .threed-red  { color: red; }

			&.external {
				display: inline-flex;
				align-items: center;
				gap: 0.5ch;

				&:focus-visible {
					outline-offset: 0.25em;
				}

				.arrow-external path {
					transition: d var(--animation-timing) ease;
					&:nth-child(1) { d: path("M 3.5 6.5 L 6.5 3.5"); }
					&:nth-child(2) { d: path("M 6.5 3.5 L 3.5 3.5"); }
					&:nth-child(3) { d: path("M 6.5 3.5 L 6.5 6.5"); }
				}
				&:hover, &:focus-visible {
					.arrow-external path {
						&:nth-child(1) { d: path("M 2.5 7.5 L 7.5 2.5"); }
						&:nth-child(2) { d: path("M 7.5 2.5 L 4.5 2.5"); }
						&:nth-child(3) { d: path("M 7.5 2.5 L 7.5 5.5"); }
					}
				}
			}
		}

		button, select, input {
			font-family: inherit;
		}

		#get-showtimes-form {
			display: flex;
			flex-wrap: wrap;
			min-height: 5rem;
			line-height: 100%;
			gap: 1rem 2rem;
		}

		#geo-options {
			gap: 0.5rem;

			& [name="zip"] {
				width: 10ch;
				max-width: calc(100dvw - (var(--body--padding) * 2));
				text-align: center;
			}
		}

		input-group {
			display: flex;
			flex-wrap: wrap;
		}

		.dropdown {
			position: relative;

			> .dropdown-trigger {
				cursor: pointer;
				border-bottom: 1px dotted currentColor;
				transition: border-bottom-color var(--animation-timing--fast) ease;

				&:hover, &:focus-visible {
					border-bottom-color: transparent;

					.chevron path {
						&:first-child { d: path("M 2 1 L 7 5"); }
						&:last-child  { d: path("M 7 5 L 2 9"); }
					}
				}

				&:focus-visible {
					outline-offset: 0.25em;
				}

				/* Hide native disclosure triangle */
				list-style: none;
				&::-webkit-details-marker {
					display: none;
				}

				/* Add custom disclosure chevron */
				display: inline-flex;
				align-items: center;
				gap: 1ch;

				.chevron path {
					transition: d var(--animation-timing) ease;
					&:first-child { d: path("M 3 2 L 7 5"); }
					&:last-child  { d: path("M 7 5 L 3 8"); }
				}

			}

			&[open] {
				> .dropdown-trigger {
					color: black;
					border-bottom-color: transparent;

					.chevron path {
						&:first-child { d: path("M 2 2 L 8 8"); }
						&:last-child  { d: path("M 8 2 L 2 8"); }
					}

					&::before {
						content: ' ';
						display: block;
						position: fixed;
						inset: 0;
						cursor: default;
						z-index: 10;
					}
				}
			}

			> dropdown-contents {
				position: absolute;
				position-area: bottom left;
				z-index: 11;

				display: flex;
				flex-direction: column;
				gap: 0.5lh;
				width: max-content;
				max-width: min(calc(100dvw - (var(--body--padding) * 4)), 50ch);
				padding: 1rem;

				background-color: white;
				color: black;
				border: 1px solid #777;
				box-shadow: 0.25rem 0.25rem 0 rgba(0,0,0,0.25);
				font-size: 1.4rem;
				line-height: 1.4;
				text-wrap: pretty;

				p {
					margin: 0;
					padding: 0;
				}

				ul, ol, li {
					margin: 0;
					padding: 0;
					list-style-type: none;
				}
			}
		}

		.primary-section {
			display: flex;
			flex-direction: column;
			gap: 2rem;
		}

		.secondary-sections {
			display: flex;
			flex-direction: column;
			gap: 2rem;

			@media (min-width: 900px) {
				display: grid;
				grid-template-columns: 1fr 1fr;
				column-gap: var(--body--gap);
			}
		}

		.secondary-sections-col {
			display: flex;
			flex-direction: column;
			gap: 2rem;
		}

		.secondary-section {
			display: flex;
			flex-direction: column;
			gap: 0.5rem;
		}

		.primary-label {
			font-size: 150%;
			font-weight: 700;
			margin: 0;
		}

		.secondary-label {
			font-size: 100%;
			font-weight: 600;
			margin: 0;
		}

		.primary-metadata {
			display: flex;
			flex-wrap: wrap;
			column-gap: 2rem;
			margin: 0;
			padding: 0;
			list-style-type: none;
			font-size: 1.4rem;
			line-height: 1.4;
			color: #777;

			& li {
				padding: 0;
			}
			& a {
				text-decoration: none;
				border-bottom: 1px solid currentColor;
				transition: border-bottom-color var(--animation-timing--fast) ease;

				&:hover, &:focus-visible {
					border-bottom-color: transparent;
				}

				&:visited {
					color: #999;
				}
			}
		}

		.showtime-block {
			display: flex;
			flex-wrap: wrap;
			column-gap: 2rem;
			margin: 0;
			padding: 0;
			list-style-type: none;

			& > li {
				padding: 0;
			}

			@media (min-width: 900px) {
				column-gap: 3rem;
			}
		}

		.threed,
		.imax {
			font-size: 75%;
			font-weight: bold;
		}

		.past {
			color: #aaa;
		}

		.block-radio-button, .block-checkbox {
			cursor: pointer;
			user-select: none;

			&:has(> input:disabled) {
				cursor: not-allowed;
				opacity: 0.35;
			}

			& > input {
				position: absolute;
				opacity: 0;
				pointer-events: none;

				&:focus-visible + input-label {
					outline: 0.2rem solid #2F80ED;
					outline-offset: 0.2rem;
				}
				&:checked + input-label {
					z-index: 1;
					box-shadow: inset 0 0 0 0.4rem #2F80ED;
					color: #000;
					font-weight: bold;
				}
			}
			& > input-label {
				display: flex;
				align-items: center;
				justify-content: center;
				height: 100%;
				box-shadow: inset 0 0 0 0.1rem #BDBDBD;
				text-align: center;
				white-space: nowrap;
				padding: 0.5rem 1.1rem;
				color: #333;
			}
			&:not(:has(> input:is(:disabled, :checked))) > input-label:hover {
				box-shadow: inset 0 0 0 0.4rem #BDBDBD;
			}
		}

	</style>
</head>
<body>

<header>
	<h1><a href="/">&lt;marquee&gt;</a></h1>
	<form id="get-showtimes-form" action="https://data.tmsapi.com/v1.1/movies/showings" method="GET">
		<input name="password" type="hidden" value="casablanca">
		<input-group id="geo-options">
			<input name="zip" type="text" inputmode="numeric" pattern="[0-9]{5}" maxlength="5" placeholder="ZIP code" aria-label="ZIP code" autofocus>
			<select name="radius" aria-label="Search radius">
				<option value="5">5 miles</option>
				<option value="10">10 miles</option>
				<option value="50">50 miles</option>
				<option value="100">100 miles</option>
			</select>
			<button type="submit">Find</button>
		</input-group>
		<input-group id="date-options" role="radiogroup" aria-label="Date"></input-group>
		<input-group role="radiogroup" aria-label="Group by">
			<label class="block-radio-button"><input value="Movie"   name="groupBy" type="radio" checked> <input-label>Movie</input-label></label>
			<label class="block-radio-button"><input value="Theater" name="groupBy" type="radio">         <input-label>Theater</input-label></label>
		</input-group>
		<input-group>
			<label class="block-checkbox"><input name="filterFormat" type="checkbox"> <input-label>IMAX only</input-label></label>
		</input-group>
		<input-group role="radiogroup" aria-label="Dimension">
			<label class="block-radio-button"><input value="Both" name="filterDimension" type="radio" checked> <input-label>Both</input-label></label>
			<label class="block-radio-button"><input value="2D"   name="filterDimension" type="radio">         <input-label>2D</input-label></label>
			<label class="block-radio-button"><input value="3D"   name="filterDimension" type="radio">         <input-label>3D</input-label></label>
		</input-group>
	</form>
</header>

<main id="showtimes"></main>

<script>
(function(){
	const Marquee = window.Marquee = window.Marquee || {

		apiUrl: 'https://data.tmsapi.com/v1.1/movies/showings',
		apiShowtimeCache: {},
		apiShowtimeData:  [],
		apiKeyEncrypted: "{\"salt\":\"0Vs0u/2OElGlRPpkGK8ghg==\",\"iv\":\"YzgrD4KQ6/653fBc\",\"ct\":\"IzFp0LOO7cfsxRJKBNRhvbEblXutrafAo1lgcaR8UhYEnlgWN2KXOw==\"}",
		sortOrders: {
			byMovie: {
				byTitle: [],
				byReleaseDate: [],
			},
			byTheater: {
				byName: [],
			},
		},

		els: {
			$body:             document.body,
			$showtimes:        document.getElementById('showtimes'),
			$groupButtons:     document.querySelectorAll('[name="groupBy"]'),
			$filterFormat:     document.querySelector('[name="filterFormat"]'),
			$filterDimensionButtons: document.querySelectorAll('[name="filterDimension"]'),
			$getShowtimesForm: document.getElementById('get-showtimes-form'),
			$dateOptions:      document.getElementById('date-options'),
		},

		init: function() {
			Marquee.loadPreferences();
			Marquee.setupDates();
			Marquee.updateGroupings();
			Marquee.filterFormatImax = false;
			Marquee.filterDimension  = document.querySelector('[name="filterDimension"]:checked').value;

			Marquee.els.$getShowtimesForm.addEventListener('submit', Marquee.submitShowtimesForm);
			Marquee.els.$dateButtons.forEach(button => {
				button.addEventListener('change', Marquee.changeDate);
			});
			Marquee.els.$groupButtons.forEach(button => {
				button.addEventListener('change', Marquee.changeGrouping);
			});
			Marquee.els.$filterFormat.addEventListener('change', Marquee.changeFilterFormat);
			Marquee.els.$filterDimensionButtons.forEach(button => {
				button.addEventListener('change', Marquee.changeFilterDimension);
			});

			if (localStorage.getItem('zip')) {
				Marquee.autoSearch();
			}
		},

		autoSearch: function() {
			const radiusSelect = document.querySelector('[name="radius"]');
			const attempt = () => {
				Marquee.clearData();
				Marquee.fetchMovieTimes(() => {
					if (radiusSelect.selectedIndex < radiusSelect.options.length - 1) {
						radiusSelect.selectedIndex++;
						attempt();
					}
				});
			};
			attempt();
		},

		loadPreferences: function() {
			const zip             = localStorage.getItem('zip');
			const radius          = localStorage.getItem('radius');
			const groupBy         = localStorage.getItem('groupBy');
			const filterDimension = localStorage.getItem('filterDimension');
			const filterFormat    = localStorage.getItem('filterFormat');

			if (zip)             { document.querySelector('[name="zip"]').value = zip; }
			if (radius)          { document.querySelector('[name="radius"]').value = radius; }
			if (groupBy)         { document.querySelector(`[name="groupBy"][value="${groupBy}"]`).checked = true; }
			if (filterDimension) { document.querySelector(`[name="filterDimension"][value="${filterDimension}"]`).checked = true; }
			if (filterFormat)    { document.querySelector('[name="filterFormat"]').checked = filterFormat === 'true'; }
		},

		savePreferences: function() {
			localStorage.setItem('zip',             document.querySelector('[name="zip"]').value);
			localStorage.setItem('radius',          document.querySelector('[name="radius"]').value);
			localStorage.setItem('groupBy',         document.querySelector('[name="groupBy"]:checked').value);
			localStorage.setItem('filterDimension', document.querySelector('[name="filterDimension"]:checked').value);
			localStorage.setItem('filterFormat',    document.querySelector('[name="filterFormat"]').checked);
		},

		setupDates: function() {
			let dates = [];
			for (let i = 0; i < 7; i++) {
				const date = dayjs().add(i, 'day');
				dates.push(`
					<label class="block-radio-button">
						<input
							value="${date.format('YYYY-MM-DD')}"
							name="startDate"
							type="radio"
							${i === 0 ? ' checked' : ''}
						>
						<input-label>
							${date.format('ddd')}<br>${date.format('MMM D')}
						</input-label>
					</label>
				`);
			}
			dates = dates.join('');
			Marquee.els.$dateOptions.innerHTML = dates;
			Marquee.els.$dateButtons = document.querySelectorAll('[name="startDate"]');
		},

		changeDate: function() {
			if (Marquee.submittable()) {
				Marquee.autoSearch();
			}
		},

		submittable: function() {
			return (document.querySelector('[name="zip"]').value !== '');
		},

		changeGrouping: function() {
			Marquee.updateGroupings();
			Marquee.savePreferences();
			if (this.checked) {
				Marquee.renderShowtimes();
			}
		},

		changeFilterFormat: function() {
			Marquee.filterFormatImax = this.checked;
			Marquee.updateFilterAvailability();
			Marquee.savePreferences();
			Marquee.renderShowtimes();
		},

		changeFilterDimension: function() {
			if (this.checked) {
				Marquee.filterDimension = this.value;
				Marquee.updateFilterAvailability();
				Marquee.savePreferences();
				Marquee.renderShowtimes();
			}
		},

		updateGroupings: function() {
			Marquee.primaryGroup = document.querySelector('[name="groupBy"]:checked').value;
			Marquee.secondaryGroup = Marquee.primaryGroup === 'Movie' ? 'Theater' : 'Movie';
		},

		submitShowtimesForm: function(event) {
			event.preventDefault();
			if (Marquee.submittable()) {
				Marquee.autoSearch();
			}
		},

		decryptApiKey: async function() {
			const password = document.querySelector('[name="password"]').value;
			const { salt, iv, ct } = JSON.parse(Marquee.apiKeyEncrypted);
			const enc = new TextEncoder();
			const keyMaterial = await crypto.subtle.importKey(
				'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
			);
			const key = await crypto.subtle.deriveKey(
				{
					name: 'PBKDF2',
					salt: Uint8Array.from(atob(salt), c => c.charCodeAt(0)),
					iterations: 100000,
					hash: 'SHA-256',
				},
				keyMaterial,
				{ name: 'AES-GCM', length: 256 },
				false,
				['decrypt']
			);
			const decrypted = await crypto.subtle.decrypt(
				{ name: 'AES-GCM', iv: Uint8Array.from(atob(iv), c => c.charCodeAt(0)) },
				key,
				Uint8Array.from(atob(ct), c => c.charCodeAt(0))
			);
			return new TextDecoder().decode(decrypted);
		},

		serializeForm: function() {
			return {
				zip:       document.querySelector('[name="zip"]').value,
				radius:    document.querySelector('[name="radius"]').value,
				startDate: document.querySelector('[name="startDate"]:checked').value,
			};
		},

		clearData: function() {
			Marquee.apiShowtimeData    = [];
			Marquee.dataForMovie       = {};
			Marquee.dataForTheater     = {};
			Marquee.showtimesByMovie   = {};
			Marquee.showtimesByTheater = {};
			Marquee.showtimeBlocks     = {};
		},

		fetchMovieTimes: async function(onNoResults) {
			if (Marquee.cached()) {
				Marquee.renderFromCache();
				return;
			}
			Marquee.els.$body.classList.add('loading');
			try {
				const apiKey = await Marquee.decryptApiKey();
				const params = new URLSearchParams({ ...Marquee.serializeForm(), api_key: apiKey });
				const response = await fetch(`${Marquee.apiUrl}?${params}`);
				if (!response.ok) throw new Error('Server error');
				const text = await response.text();
				const data = text.trim() ? JSON.parse(text) : [];
				if (!data.length) {
					if (onNoResults) {
						onNoResults();
					} else {
						alert('There are no results for this ZIP code.');
					}
					return;
				}
				Marquee.savePreferences();
				Marquee.apiShowtimeCache[Marquee.makeCacheKey()] = data;
				Marquee.renderFromCache();
			} catch (err) {
				alert(err.message || 'Connection error');
			} finally {
				Marquee.els.$body.classList.remove('loading');
			}
		},

		makeCacheKey: function() {
			const data = Marquee.serializeForm();
			return `${data.zip}--${data.radius}--${data.startDate}`;
		},

		cached: function() {
			return Object.hasOwn(Marquee.apiShowtimeCache, Marquee.makeCacheKey());
		},

		renderFromCache: function() {
			Marquee.apiShowtimeData = Marquee.apiShowtimeCache[Marquee.makeCacheKey()];
			Marquee.processShowtimes();
			Marquee.updateFilterAvailability();
			Marquee.renderShowtimes();
		},

		updateFilterAvailability: function() {
			const { imax2D, imax3D, nonImax2D, nonImax3D } = Marquee.availability;
			const imax  = Marquee.filterFormatImax;
			const dim   = Marquee.filterDimension;

			const imaxAvailable = dim === 'Both' ? (imax2D || imax3D)
			                    : dim === '2D'   ? imax2D
			                    :                  imax3D;
			const threeDAvailable = imax ? imax3D : (imax3D || nonImax3D);
			const twoDAvailable   = imax ? imax2D : (imax2D || nonImax2D);

			Marquee.els.$filterFormat.disabled                                      = !imaxAvailable;
			document.querySelector('[name="filterDimension"][value="3D"]').disabled = !threeDAvailable;
			document.querySelector('[name="filterDimension"][value="2D"]').disabled = !twoDAvailable;

			if (Marquee.filterFormatImax && !imaxAvailable) {
				Marquee.els.$filterFormat.checked = false;
				Marquee.filterFormatImax = false;
			}
			if (Marquee.filterDimension === '3D' && !threeDAvailable) {
				document.querySelector('[name="filterDimension"][value="Both"]').checked = true;
				Marquee.filterDimension = 'Both';
			}
			if (Marquee.filterDimension === '2D' && !twoDAvailable) {
				document.querySelector('[name="filterDimension"][value="Both"]').checked = true;
				Marquee.filterDimension = 'Both';
			}
		},

		filteredBlockHtml: function(block) {
			if (!Marquee.filterFormatImax && Marquee.filterDimension === 'Both') return block.html;
			let html = '';
			block.showtimesKeys.forEach(key => {
				const s = block.showtimes[key];
				if (Marquee.filterFormatImax && !s.imax)           return;
				if (Marquee.filterDimension === '3D' && !s.threed) return;
				if (Marquee.filterDimension === '2D' && s.threed)  return;
				html += `
					<li data-threed="${s.threed}" data-imax="${s.imax}">
						${Marquee.createShowtimeLink(s)}
					</li>
				`;
			});
			return html;
		},

		renderShowtimes: function() {
			let html = '';
			const showtimes = Marquee[`showtimesBy${Marquee.primaryGroup}`];
			Object.entries(showtimes).forEach(([primaryId, secondaryObject]) => {
				const sections = [];
				Object.entries(secondaryObject).forEach(([secondaryId, block]) => {
					const blockHtml = Marquee.filteredBlockHtml(block);
					if (!blockHtml) return;
					const secondaryEntity = Marquee[`dataFor${Marquee.secondaryGroup}`][secondaryId];
					sections.push(`
						<section class="secondary-section">
							<h2 class="secondary-label">${secondaryEntity.label}</h2>
							<ul class="showtime-block">${blockHtml}</ul>
						</section>
					`);
				});
				if (!sections.length) return;
				const tipper = Math.ceil(sections.length / 2);
				const leftCol  = sections.slice(0, tipper).join('');
				const rightCol = sections.slice(tipper).join('');
				const primaryEntity = Marquee[`dataFor${Marquee.primaryGroup}`][primaryId];
				html += `
					<section class="primary-section">
						<h1 class="primary-label">${primaryEntity.label}</h1>
						${primaryEntity.metadata.length ? `<ul class="primary-metadata"><li>${primaryEntity.metadata.join('</li><li>')}</li></ul>` : ''}
						<div class="secondary-sections">
							<div class="secondary-sections-col">${leftCol}</div>
							<div class="secondary-sections-col">${rightCol}</div>
						</div>
					</section>
				`;
			});
			Marquee.els.$showtimes.innerHTML = html;
		},

		processShowtimes: function() {
			Marquee.apiShowtimeData.sort((a, b) => {
				const aRelease = a.releaseDate || '1900-01-01';
				const bRelease = b.releaseDate || '1900-01-01';
				if (aRelease === bRelease) {
					return a.title > b.title;
				}
				return dayjs(aRelease).valueOf() > dayjs(bRelease).valueOf();
			});
			Marquee.apiShowtimeData.forEach(movie => {
				Marquee.sortOrders.byMovie.byReleaseDate.push(movie.rootId);
				Marquee.createMovie(movie);
				movie.showtimes.forEach(showtime => {
					Marquee.createTheater(showtime.theatre);
					Marquee.seedGroupings(movie.rootId, showtime.theatre.id);
					Marquee.addToShowtimeBlock(movie, showtime);
				});
			});
			Marquee.createShowtimeHTML();
			Marquee.groupShowtimes();
			const showtimes = Object.values(Marquee.showtimeBlocks).flatMap(b => Object.values(b.showtimes));
			Marquee.availability = {
				imax2D:    showtimes.some(s =>  s.imax && !s.threed),
				imax3D:    showtimes.some(s =>  s.imax &&  s.threed),
				nonImax2D: showtimes.some(s => !s.imax && !s.threed),
				nonImax3D: showtimes.some(s => !s.imax &&  s.threed),
			};
		},

		createMovie: function(movie) {
			Marquee.dataForMovie[movie.rootId] = Marquee.dataForMovie[movie.rootId] || {
				label:       movie.title || '[no title]',
				year:        movie.releaseYear || null,
				releaseDate: movie.releaseDate || null,
				rating:      movie.ratings ? movie.ratings[0].code : null,
				language:    movie.titleLang || null,
				runtime:     movie.runTime ? movie.runTime.replace('PT0', '').replace('PT', '') : null,
				description: movie.longDescription || null,
				directors:   movie.directors?.length  ? movie.directors  : null,
				topCast:     movie.topCast?.length    ? movie.topCast    : null,
				advisories:  movie.advisories?.length ? movie.advisories : null,
				genres:      movie.genres?.length     ? movie.genres     : null,
				animated:    !!movie.animation,
			};
			Marquee.createMovieMetadata(movie.rootId);
		},

		createMovieMetadata: function(id) {
			const movie    = Marquee.dataForMovie[id];
			const metadata = [];
			const year = movie.year || movie.releaseDate?.substring(0, 4) || null;
			const trailerQuery = new URLSearchParams({search_query: [movie.label, year, 'trailer'].filter(Boolean).join(' ')});

			const detailContents = [];
			if (movie.description) detailContents.push(`<p>${movie.description}</p>`);
			if (movie.directors)   detailContents.push(`<p><b>Directed by:</b> ${movie.directors.join(', ')}</p>`);
			if (movie.topCast)     detailContents.push(`<p><b>Starring:</b> ${movie.topCast.join(', ')}</p>`);
			if (movie.genres)      detailContents.push(`<p><i>${movie.genres.join(', ')}</i></p>`);
			if (detailContents.length) { metadata.push(`
				<details class="dropdown">
					<summary class="dropdown-trigger">
						Description
						<svg class="chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 10 10" width="0.6em" height="0.6em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path/><path/></svg>
					</summary>
					<dropdown-contents>${detailContents.join('')}</dropdown-contents>
				</details>`); }
			if (movie.rating && movie.advisories) { metadata.push(`
				<details class="dropdown">
					<summary class="dropdown-trigger">
						${movie.rating}
						<svg class="chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 10 10" width="0.6em" height="0.6em" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path/><path/></svg>
					</summary>
					<dropdown-contents>
						<ul><li>${movie.advisories.join('</li><li>')}</li></ul>
					</dropdown-contents>
				</details>`); }
			else if (movie.rating) { metadata.push(movie.rating); }
			if (year) { metadata.push(year); }
			if (movie.runtime) { metadata.push(movie.runtime.toLowerCase()); }
			if (movie.animated) { metadata.push('✍️ Animated'); }
			metadata.push(`
				<a class="external" href="https://www.youtube.com/results?${trailerQuery}" target="_blank" rel="noopener noreferrer">
					Trailers
					<svg class="arrow-external" width="1em" height="1em" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><path/><path/><path/></svg>
				</a>`);
			Marquee.dataForMovie[id].metadata = metadata;
		},

		createTheater: function(theater) {
			Marquee.dataForTheater[theater.id] = Marquee.dataForTheater[theater.id] || {
				label: theater.name,
			};
			Marquee.createTheaterMetadata(theater.id);
		},

		createTheaterMetadata: function(id) {
			const metadata = [];
			Marquee.dataForTheater[id].metadata = metadata;
		},

		addToShowtimeBlock: function(movie, showtime) {
			const uid = movie.rootId + '-' + showtime.theatre.id;
			Marquee.showtimeBlocks[uid] = Marquee.showtimeBlocks[uid] || {showtimes: {}, showtimesKeys: []};

			const showtimeData = {
				movieId:       movie.rootId,
				theaterId:     showtime.theatre.id,
				dateTime:      showtime.dateTime,
				dateTimeDayJS: dayjs(showtime.dateTime),
				ticket:        showtime.ticketURI,
				threed:        Marquee.is3D(movie),
				imax:          Marquee.isIMAX(movie),
			};
			Marquee.showtimeBlocks[uid].showtimes[showtimeData.dateTimeDayJS.unix()] = showtimeData;
			Marquee.showtimeBlocks[uid].showtimesKeys.push(showtimeData.dateTimeDayJS.unix());
		},

		seedGroupings: function(movieId, theaterId) {
			Marquee.showtimesByMovie[movieId] = Marquee.showtimesByMovie[movieId] || {};
			Marquee.showtimesByMovie[movieId][theaterId] = Marquee.showtimesByMovie[movieId][theaterId] || {};
			Marquee.showtimesByTheater[theaterId] = Marquee.showtimesByTheater[theaterId] || {};
			Marquee.showtimesByTheater[theaterId][movieId] = Marquee.showtimesByTheater[theaterId][movieId] || {};
		},

		createShowtimeHTML: function() {
			Object.entries(Marquee.showtimeBlocks).forEach(([uid, block]) => {
				let html = '';
				block.showtimesKeys.sort();
				block.showtimesKeys.forEach(key => {
					const showtimeData = block.showtimes[key];
					html += `
						<li data-threed="${showtimeData.threed}" data-imax="${showtimeData.imax}">
							${Marquee.createShowtimeLink(showtimeData)}
						</li>
					`;
				});
				block.html = html;
			});
		},

		groupShowtimes: function() {
			Object.entries(Marquee.showtimeBlocks).forEach(([uid, block]) => {
				const ids       = uid.split('-');
				const movieId   = ids[0];
				const theaterId = ids[1];
				Marquee.showtimesByMovie[movieId][theaterId]   = block;
				Marquee.showtimesByTheater[theaterId][movieId] = block;
			});
		},

		is3D: function(movie) {
			return movie.title.includes('3D');
		},

		isIMAX: function(movie) {
			return movie.title.includes('IMAX');
		},

		createThreeD: function(showtime) {
			return (showtime.threed ? '<span class="threed"> <span class="threed-blue">3</span><span class="threed-red">D</span></span>' : '');
		},

		createIMAX: function(showtime) {
			return (showtime.imax ? '<span class="imax"> IMAX</span>' : '');
		},

		createShowtimeLink: function(showtime) {
			if (showtime.dateTimeDayJS.isBefore(dayjs())) {
				return `
					<span class="past">
						${showtime.dateTimeDayJS.format('h:mma')}${Marquee.createThreeD(showtime)}${Marquee.createIMAX(showtime)}
					</span>`;
			} else {
				return `
					<a href="${showtime.ticket}">
						${showtime.dateTimeDayJS.format('h:mma')}${Marquee.createThreeD(showtime)}${Marquee.createIMAX(showtime)}
					</a>`;
			}
		},

	};
	Marquee.init();
})();
</script>
</body>
</html>
